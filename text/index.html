
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DocEdit — Sentence Workflow Editor</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- ═══════════════════ TOP BAR ═══════════════════ -->
<header class="topbar d-flex align-items-center px-4">
  <span class="topbar-logo">
    <i class="bi bi-file-earmark-richtext me-2"></i>DocEdit
  </span>
  <span class="topbar-tagline ms-3">Sentence-by-sentence workflow editor</span>
  <div class="ms-auto d-flex align-items-center gap-3">
    <button class="btn btn-sm btn-outline-secondary" id="btnLoad">
      <i class="bi bi-cloud-download me-1"></i>Load Sample
    </button>
    <button class="btn btn-sm btn-primary" id="btnReset">
      <i class="bi bi-arrow-counterclockwise me-1"></i>Reset
    </button>
    <div class="kbd-hint"><kbd>Tab</kbd> advance &nbsp;·&nbsp; <kbd>Shift+Tab</kbd> revert</div>
  </div>
</header>

<!-- ═══════════════════ MAIN WORKSPACE ═══════════════════ -->
<main class="workspace" id="workspace">

  <div class="top-row" id="topRow">

    <div class="pane pane-input" id="paneInput">
      <div class="pane-header">
        <span class="pane-label"><i class="bi bi-inbox me-2"></i>Input Panel</span>
        <span class="pane-badge" id="inputCount">0 sentences</span>
        <button class="btn-panel-toggle state-on ms-auto" id="btnInputEdit" title="Toggle editing">
          <i class="bi bi-pencil-fill"></i><span>Edit: On</span>
        </button>
      </div>
      <div class="pane-body"><div id="editorInput"></div></div>
    </div>

    <div class="drag-handle drag-handle-v" id="dragV"><div class="drag-dots"></div></div>

    <div class="pane pane-output" id="paneOutput">
      <div class="pane-header">
        <span class="pane-label"><i class="bi bi-check2-all me-2"></i>Output Panel</span>
        <span class="pane-badge" id="outputCount">0 sentences</span>
        <div class="ms-auto d-flex align-items-center gap-2">
          <button class="btn-panel-toggle state-off" id="btnOutputEdit" title="Toggle editing">
            <i class="bi bi-lock-fill"></i><span>Edit: Off</span>
          </button>
          <button class="btn-copy-all" id="btnCopyAll" title="Copy all content">
            <i class="bi bi-clipboard"></i><span>Copy All</span>
          </button>
        </div>
      </div>
      <div class="pane-body"><div id="editorOutput"></div></div>
    </div>

  </div>

  <div class="drag-handle drag-handle-h" id="dragH"><div class="drag-dots drag-dots-h"></div></div>

  <!-- ── BOTTOM: Working Panel ── -->
  <div class="pane pane-working" id="paneWorking">

    <div class="pane-header">
      <span class="pane-label"><i class="bi bi-pencil-square me-2"></i>Working Panel</span>
      <span id="grammarBadge" class="grammar-badge ms-3"></span>
      <span id="grammarStatus" class="grammar-status ms-2"></span>
      <div class="ms-auto d-flex align-items-center gap-2">
        <span class="pane-badge" id="sentencePos">—</span>
        <button class="btn btn-xs btn-tab" id="btnPrev" title="Shift+Tab">
          <i class="bi bi-arrow-left-short"></i> Prev
        </button>
        <button class="btn btn-xs btn-tab btn-tab-next" id="btnNext" title="Tab">
          Next <i class="bi bi-arrow-right-short"></i>
        </button>
      </div>
    </div>

    <div class="working-body">

      <!-- Editor (full height, no grammar sub-panel) -->
      <div class="working-editor-col">
        <div class="pane-body working-quill-wrap">
          <div id="editorWorking"></div>
        </div>
      </div>

      <!-- Resize handle between editor and dictionary -->
      <div class="drag-handle drag-handle-v" id="dragDict" title="Drag to resize dictionary">
        <div class="drag-dots"></div>
      </div>

      <!-- Dictionary -->
      <div class="working-dict-col" id="dictCol">
        <div class="dict-hdr">
          <i class="bi bi-book-half me-1"></i>Dictionary
          <span id="dictWordChip" class="dict-word-chip ms-2"></span>
        </div>
        <div id="dictBody" class="dict-body">
          <div class="dict-placeholder">
            <i class="bi bi-cursor-text"></i>
            <p>Select a word in the Working Panel to look it up</p>
          </div>
        </div>
      </div>

    </div>
  </div>

</main>

<!-- STATUS BAR -->
<footer class="statusbar d-flex align-items-center px-4">
  <span id="statusMsg"><i class="bi bi-info-circle me-1"></i>Ready — load a document into the Input Panel, then press <kbd>Tab</kbd> to begin.</span>
  <span class="ms-auto" id="statusProgress"></span>
</footer>

<!-- ── Grammar Context-Menu Popup ── -->
<div id="grammarPopup" class="grammar-popup" style="display:none">
  <div class="grammar-popup-hdr" id="grammarPopupMsg"></div>
  <div id="grammarPopupSuggestions"></div>
  <div class="grammar-popup-dismiss" id="grammarPopupDismiss">
    <i class="bi bi-x me-1"></i>Dismiss
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
<script src="app.js"></script>
</body>
</html>
